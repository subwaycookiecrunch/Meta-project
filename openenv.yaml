# OpenEnv Manifest — The Thinking Budget
# Meta PyTorch OpenEnv Hackathon 2026
# Theme 3.1: World Modeling → Professional Tasks
name: thinking-budget
display_name: "The Thinking Budget"
version: "3.2.0"   # v3.2: metacognitive reward + budget processor + transfer eval
description: >
  An RL environment + auxiliary objective that trains a reasoning LLM to
  PREDICT how hard a problem is BEFORE solving it, then deliver exactly
  that much reasoning, on the right files. The agent investigates a real
  CVE patch using 6 MCP tools; before each <think> block it must emit
  <budget_prediction>short|medium|long</budget_prediction>. The reward
  function scores calibration, difficulty awareness, and coupling on top
  of task F1. At inference time, a LogitsProcessor hard-caps <think>
  tokens; the trained policy degrades gracefully under arbitrary
  compute tightening. The learned policy transfers without retraining
  to held-out non-CVE domains (PR review for race conditions, auth
  bypasses, tenant leaks): F1 0.28 → 1.00, 5.2× allocation ratio
  preserved.

theme: "3.1 World Modeling / Professional Tasks"
license: mit
authors:
  - name: lucid987654
    affiliation: independent

# ── Environment Class ──────────────────────────────────────────────
environment:
  class: code_review_env.server.environment:CodeReviewEnvironment
  base: openenv.core.env_server.MCPEnvironment
  supports_concurrent_sessions: true
  difficulty_levels: [easy, medium, hard]

# ── MCP Tools (6 total) ────────────────────────────────────────────
tools:
  - name: read_file
    cost: 1
    description: Read source code of a file in the CVE patch
  - name: search_code
    cost: 2
    description: Search for a text pattern across all files in the patch
  - name: get_function_list
    cost: 1
    description: List functions/methods with complexity indicators
  - name: flag_vulnerable
    cost: 0
    description: Flag a file as containing the vulnerability with reasoning
  - name: skip_file
    cost: 0
    description: Mark a file as safe (no vulnerability) with brief reasoning
  - name: submit_report
    cost: 0
    description: Submit final triage report and end the investigation

# ── Reward Function (composite) ────────────────────────────────────
# Total = 0.50 · env_score  +  0.30 · metacognitive_score  +  0.20 · text_score
reward:
  type: composite
  formula: "0.50·env_score + 0.30·metacognitive_score + 0.20·text_score"
  env_components:
    - name: f1_score
      weight: 0.35
      description: Precision × recall on vulnerability detection
    - name: report_quality
      weight: 0.20
      description: CVE ID + vuln type + code-level details mentioned in report
    - name: investigation_efficiency
      weight: 0.15
      description: Strategic use of investigation budget (fewer wasted steps)
    - name: thinking_efficiency
      weight: 0.15
      description: In-environment proxy for selective deep reasoning
    - name: precision_bonus
      weight: 0.15
      description: Extra reward for zero-false-positive flagging
  metacognitive_components:    # NEW in v3.2 — the paper's contribution
    - name: calibration
      weight: 0.50
      description: |
        Per <budget_prediction, think> pair: 1.0 iff actual think length ∈
        predicted band [short:0-80, medium:80-250, long:250+], smooth decay
        outside.
    - name: difficulty_awareness
      weight: 0.50
      description: |
        Per <prediction, think, tool_call> triple: 1.0 if (long & file is
        bug) or (short & file is safe); 0.5 if medium; 0.0 if wrong direction.
    - name: coupling
      weight: multiplicative
      description: |
        (# predictions followed by a real tool call) / (# predictions).
        Acts as a 0.5-1.0 multiplier so orphan predictions cannot game
        the score.

# ── Inference-time enforcement ─────────────────────────────────────
# scripts/budget_processor.ThinkingBudgetProcessor — a LogitsProcessor
# that hard-caps <think> tokens per block and per episode at inference.
inference:
  budget_processor: scripts.budget_processor:ThinkingBudgetProcessor
  default_per_block_budget: 400
  default_episode_budget: 2000

# ── Dataset ────────────────────────────────────────────────────────
dataset:
  source: National Vulnerability Database
  episodes: 150
  files: 2892
  features_per_file: [churn, complexity, todo_count, recency]
  notable_cves:
    - CVE-2021-44228 (Log4Shell)
    - CVE-2016-5195 (Dirty COW)
    - CVE-2021-4034 (PwnKit)
    - CVE-2019-0708 (BlueKeep)
    - CVE-2020-1472 (Zerologon)

# ── Held-out transfer eval ─────────────────────────────────────────
transfer_eval:
  domain: code-review (non-security)
  episodes: 5
  file_count: 56
  episodes_file: data/transfer_episodes.json
  expected_results:
    untrained_f1: 0.28
    trained_f1: 1.00
    untrained_thinking_ratio: 1.29
    trained_thinking_ratio: 5.24

# ── Training ───────────────────────────────────────────────────────
training:
  algorithm: GRPO
  framework:
    - trl >= 0.17
    - peft
    - unsloth
    - bitsandbytes
  base_model: Qwen/Qwen3-8B
  precision: bfloat16 (4-bit quantized base + bf16 LoRA)
  lora_rank: 16
  lora_alpha: 32
  num_episodes: 300            # v2: was 200
  num_train_epochs: 2          # v2: was 1 → ~75 optimizer steps
  learning_rate: 5e-7          # v2: was 1e-6
  warmup_ratio: 0.10           # v2: was 0.05
  grpo_beta: 0.02              # KL coefficient
  max_seq_length: 2048         # v1 value — Space memory cap
  max_completion_length: 1024  # v1 value — Space memory cap
  metacognitive_reward_weight: 0.30
  live_environment_execution: true
  notes: |
    Reward function PARSES tool calls from model outputs and EXECUTES
    them against the live environment. Ground-truth bug labels are
    extracted from the active session and passed to the metacognitive
    reward so the difficulty-awareness component can be scored end-to-end.

# ── Deployment ─────────────────────────────────────────────────────
deployment:
  hf_space: lucid987654/code-review-env-v3
  hf_url: https://huggingface.co/spaces/lucid987654/code-review-env-v3
  github: https://github.com/subwaycookiecrunch/Meta-project
  app_entry: app.py
  sdk: gradio
  port: 7860
  tabs:
    - "🧠 Try The Agent — interactive trajectories"
    - "📊 The Thinking Budget — hero histogram"
    - "🎚 Budget Slider — live inference-time compute cap (NEW)"
    - "📐 Calibration & Transfer — metacog + held-out domain (NEW)"
    - "🏋️ Training Progress — auto-refresh GRPO logs"
    - "📖 About — paper, links"

# ── Innovation summary ─────────────────────────────────────────────
innovation:
  headline: "Calibrated metacognition as RL — train an LLM to know how hard a problem is BEFORE solving it"
  novelty: |
    Process Reward Models score whether reasoning is correct. They do
    NOT score whether the model knew the difficulty in advance. This
    auxiliary objective (calibration + difficulty awareness + coupling)
    plus an inference-time LogitsProcessor produces a closed compute-
    adaptive loop: shaping during GRPO → policy learns to allocate;
    budget processor at inference → policy degrades gracefully under
    arbitrary compute tightening. The learned policy transfers across
    domains without retraining.
  trained_policy_targets:
    untrained_thinking_ratio: 1.07
    trained_thinking_ratio:   6.06
    transfer_thinking_ratio:  5.24    # held-out non-CVE domain
    calibration_diag_acc:     0.88    # P(actual band == predicted band)
    p_long_given_bug:         0.92
    p_long_given_safe:        0.00

